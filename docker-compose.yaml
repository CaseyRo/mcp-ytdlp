services:
  mcp-ytdlp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-ytdlp
    ports:
      - "${HOST_PORT:-8718}:8000"
    environment:
      OUTPUT_DIRECTORY: ${OUTPUT_DIRECTORY:-/data}
      CLEANUP_RETENTION_DAYS: ${CLEANUP_RETENTION_DAYS:-7}
      # Cap id to 60 chars so generic-extractor URLs (signed CDN links,
      # 300+ chars) don't trip Errno 36 "File name too long" on ext4/APFS.
      VIDEO_FILENAME_FORMAT: ${VIDEO_FILENAME_FORMAT:-%(extractor_key)s-%(id).60s.%(ext)s}
      MCP_API_KEY: ${MCP_API_KEY:-}
    volumes:
      - ${OUTPUT_HOST_DIR:-ytdlp_output}:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost',8000)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  ytdlp_output:
